
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annu Kushwah | Game Dev Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617; /* Deeper midnight blue-black */
            color: #f1f5f9;
            overflow-x: hidden;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(6, 182, 212, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.15;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        @keyframes scan-v {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
        .bg-image-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            filter: grayscale(100%) brightness(0.3);
        }
        .grid-bg-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(rgba(34, 197, 94, 0.05) 1.5px, transparent 1.5px),
                linear-gradient(to bottom, #020617, #0f172a);
            background-size: 60px 60px, 100% 100%;
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.1);
        }
        .hud-corner {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(6, 182, 212, 0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group:hover .hud-corner {
            border-color: rgba(34, 197, 94, 1);
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.8));
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#166534, #0891b2);
            border-radius: 5px;
            border: 2px solid #020617;
        }
        .section-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #22c55e, #06b6d4);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "dom": "https://esm.sh/dom@^0.0.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="bg-image-layer"></div>
    <div class="grid-bg-layer"></div>
    <div id="root"></div>
    <div class="scanline"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
