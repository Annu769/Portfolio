
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annu Kushwah | Game Dev Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #e5e7eb;
            overflow-x: hidden;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(34, 197, 94, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
        @keyframes scan-v {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
        @keyframes bg-zoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .bg-image-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            filter: grayscale(80%) brightness(0.4) contrast(1.2);
            animation: bg-zoom 30s ease-in-out infinite;
        }
        .grid-bg-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(rgba(34, 197, 94, 0.1) 1.5px, transparent 1.5px),
                linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 1));
            background-size: 50px 50px, 100% 100%;
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }
        .glass {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(34, 197, 94, 0.15);
        }
        .hud-corner {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: rgba(34, 197, 94, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group:hover .hud-corner {
            border-color: rgba(34, 197, 94, 1);
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.8));
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #166534;
            border-radius: 4px;
            border: 2px solid #050505;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #22c55e;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="bg-image-layer"></div>
    <div class="grid-bg-layer"></div>
    <div id="root"></div>
    <div class="scanline"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
